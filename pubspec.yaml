name: musix
description: A music quiz game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  easy_localization: ^3.0.7
  geolocator: ^13.0.2
  flutter_nominatim: ^0.0.1+2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.2.1
  path: ^1.9.1
  world_info_plus: ^1.0.0+3
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/animations/Loading.json
    - assets/animations/Confetti.gif
    - assets/audio/
    - .env